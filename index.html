<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to July 26, 2031</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: black;
        color: white;
        font-family: 'Arial', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }
    #countdown {
        font-size: 8vw;
        font-weight: bold;
        margin-bottom: 40px;
        text-align: center;
        letter-spacing: 2px;
    }
    #progress-container {
        width: 80%;
        height: 40px;
        border: 2px solid white;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
    }
    #progress-bar {
        height: 100%;
        background-color: white;
        width: 0%;
        transition: width 1s linear;
    }
    #progress-text {
        position: absolute;
        width: 100%;
        text-align: center;
        line-height: 40px;
        color: white;
        font-size: 16px;
        font-weight: bold;
        mix-blend-mode: difference;
        pointer-events: none;
    }
    .labels {
        font-size: 2vw;
        color: #aaa;
    }
</style>
</head>
<body>

<div id="countdown">Loading...</div>
<div id="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">0.000000%</div>
</div>

<script>
    // Start Date: Today (June 25, 2026)
    const startDate = new Date("2026-06-25T00:00:00").getTime();
    // End Date: July 26, 2031
    const endDate = new Date("2031-07-26T00:00:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = endDate - now;

        if (distance < 0) {
            document.getElementById("countdown").innerHTML = "TIME IS UP";
            document.getElementById("progress-bar").style.width = "100%";
            document.getElementById("progress-text").innerHTML = "100.000000%";
            return;
        }

        // Time calculations
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Formatting
        document.getElementById("countdown").innerHTML = 
            `${days}<span class="labels">d</span> ${hours.toString().padStart(2, '0')}<span class="labels">h</span> ${minutes.toString().padStart(2, '0')}<span class="labels">m</span> ${seconds.toString().padStart(2, '0')}<span class="labels">s</span>`;

        // Progress Bar calculation
        const totalDuration = endDate - startDate;
        const elapsed = now - startDate;
        let percentage = (elapsed / totalDuration) * 100;
        
        // Cap at 0 and 100
        if (percentage < 0) percentage = 0;
        if (percentage > 100) percentage = 100;

        document.getElementById("progress-bar").style.width = percentage + "%";
        document.getElementById("progress-text").innerHTML = percentage.toFixed(6) + "%";
    }

    // Run every second
    setInterval(updateCountdown, 1000);
    // Initial call
    updateCountdown();
</script>
</body>
</html>
